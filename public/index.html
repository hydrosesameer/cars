<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAFS - Flight Kitchen Inventory System</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  </head>
  <body>
    <div class="app-container">
      <!-- Sidebar Navigation -->
      <aside class="sidebar" id="sidebar-container"></aside>

      <!-- Main Content Area -->
      <main class="main-content">
        <!-- Header Bar -->
        <header class="top-bar" id="top-bar-container"></header>

        <!-- Dynamic Page Content Container -->
        <div id="page-content" class="content-body">
          <!-- Dashboard Page -->
          <section id="page-dashboard" class="page active">

            <!-- Welcome Banner -->
            <div class="dash-welcome">
              <div>
                <h1 class="dash-title">Warehouse Dashboard</h1>
                <p class="dash-subtitle" id="dash-subtitle">CAFS Customs Bonded Warehouse — COK15173</p>
              </div>
              <div class="dash-date" id="dash-date"></div>
            </div>

            <!-- Stats Cards — Vibrant Gradient -->
            <div class="dash-stats" id="stats-container">
              <!-- Injected by JS -->
            </div>

            <!-- Super Admin Special Tools -->
            <div id="super-admin-tools" style="display: none;">
              <div class="card" style="margin-top: 2rem;">
                <div class="card-header">
                  <h3 class="card-title"><i class="fas fa-bolt" style="color: var(--accent-orange);"></i> Quick User Access (Auto-Login)</h3>
                </div>
                <div class="card-body">
                   <div id="auto-login-user-list" class="auto-login-grid">
                      <div class="loading">Loading active users...</div>
                   </div>
                </div>
              </div>
            </div>

            <!-- Quick Access Shortcuts -->
            <div class="dash-quick-access">
              <a href="inward-entry.html" class="quick-card quick-inward">
                <i class="fas fa-arrow-down"></i>
                <span>New Inward</span>
              </a>
              <a href="outward-entry.html" class="quick-card quick-outward">
                <i class="fas fa-arrow-up"></i>
                <span>New Outward</span>
              </a>
              <a href="stock.html" class="quick-card quick-stock">
                <i class="fas fa-boxes"></i>
                <span>Balance Stock</span>
              </a>
              <a href="damaged.html" class="quick-card quick-damaged">
                <i class="fas fa-heart-broken"></i>
                <span>Damaged Goods</span>
              </a>
              <a href="form-a.html" class="quick-card quick-report">
                <i class="fas fa-file-invoice"></i>
                <span>Form-A</span>
              </a>
              <a href="shipping-bill.html" class="quick-card quick-shipping">
                <i class="fas fa-file-export"></i>
                <span>Shipping Bill</span>
              </a>
            </div>

            <!-- Data Tables Grid -->
            <div class="dashboard-grid">
              <div class="card">
                <div class="card-header">
                  <h3 class="card-title"><i class="fas fa-arrow-down" style="color: var(--accent-green); margin-right: 0.5rem;"></i>Recent Inward</h3>
                  <button class="btn btn-sm btn-outline" onclick="window.location.href='inward.html'">View All</button>
                </div>
                <div class="card-body" style="padding: 0">
                  <table class="table" id="recent-inward-table">
                    <thead><tr><th>Date</th><th>Bond No</th><th>Description</th><th>Qty</th></tr></thead>
                    <tbody></tbody>
                  </table>
                </div>
              </div>
              <div class="card">
                <div class="card-header">
                  <h3 class="card-title"><i class="fas fa-arrow-up" style="color: var(--accent-blue); margin-right: 0.5rem;"></i>Recent Dispatches</h3>
                  <button class="btn btn-sm btn-outline" onclick="window.location.href='outward.html'">View All</button>
                </div>
                <div class="card-body" style="padding: 0">
                  <table class="table" id="recent-outward-table">
                    <thead><tr><th>Date</th><th>Items</th><th>Qty</th><th>Bag</th></tr></thead>
                    <tbody></tbody>
                  </table>
                </div>
              </div>
            </div>

          </section>
        </div>
      </main>
    </div>

    <!-- Notifications Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- App Engine Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    <script src="js/app.js?v=19"></script>
    <script>
      document.addEventListener('DOMContentLoaded', async () => {
        if (!authCheck()) return;
        initNavigation();
        await loadDashboard();
      });
    </script>
  </body>
</html>
