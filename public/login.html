<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAFS — Sign In</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">
          <i class="fas fa-plane-arrival"></i>
        </div>
        <h1>CAFS</h1>
        <p>Flight Kitchen Inventory System</p>
      </div>

      <form class="login-form" id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required />
            <i class="fas fa-user"></i>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required />
            <i class="fas fa-lock"></i>
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="remember-me" />
            Remember me
          </label>
        </div>

        <div class="login-error" id="login-error">
          <i class="fas fa-exclamation-circle"></i>
          <span id="error-text">Invalid credentials</span>
        </div>

        <button type="submit" class="btn-login" id="login-btn">
          Sign In
        </button>
      </form>

      <div class="login-footer">
        <p>&copy; 2026 CAFS Customs Bonded Warehouse</p>
      </div>
    </div>

    <script>
      // If already logged in, redirect to dashboard
      if (localStorage.getItem('cafs_auth')) {
        window.location.href = 'index.html';
      }

      async function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('login-btn');
        const errorEl = document.getElementById('login-error');
        const errorText = document.getElementById('error-text');

        btn.disabled = true;
        btn.textContent = 'Signing in...';
        errorEl.classList.remove('visible');

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });
          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.error || 'Invalid credentials');
          }

          localStorage.setItem('cafs_auth', JSON.stringify({
            token: data.token,
            user: data.user,
            timestamp: Date.now()
          }));

          window.location.href = 'index.html';
        } catch (err) {
          errorText.textContent = err.message;
          errorEl.classList.add('visible');
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      }
    </script>
  </body>
</html>
