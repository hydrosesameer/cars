<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Current Stock - CAFS Inventory</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar" id="sidebar-container"></aside>

      <main class="main-content">
        <header class="top-bar" id="top-bar-container"></header>
        <div class="content-body">
          <div class="page-header">
            <h1 class="page-title" id="stock-page-title">Current Warehouse Stock</h1>
            <div class="filter-group" id="stock-branch-filter-group" style="display: none; margin-left: 20px;">
              <select id="stock-branch-filter" class="form-control" style="width: 200px;">
                <option value="">All Godowns</option>
              </select>
            </div>
            <div class="btn-group" style="margin-left: 20px; display: flex; gap: 5px; background: #f8f9fa; padding: 4px; border-radius: 8px; border: 1px solid #dee2e6;">
              <button class="btn btn-sm btn-primary" id="view-bondwise" onclick="toggleStockView('bond')">Bond-wise</button>
              <button class="btn btn-sm btn-outline-secondary" id="view-itemwise" onclick="toggleStockView('item')">Item-wise</button>
            </div>
            <div class="action-btns" style="margin-left: auto;">
              <button class="btn btn-secondary" onclick="downloadSampleCSV()">
                <i class="fas fa-download"></i> Sample CSV
              </button>
              <button class="btn btn-primary" onclick="openBulkUploadModal()">
                <i class="fas fa-upload"></i> Bulk Upload Stock
              </button>
            </div>
          </div>
          <div class="card">
            <div class="card-body" style="padding: 0">
              <table class="table" id="stock-table">
                <thead>
                  <tr>
                    <th>Bond No</th>
                    <th>Items List</th>
                    <th>Consignment</th>
                    <th>Total Recv</th>
                    <th>Total Dispatched</th>
                    <th>Bag Returns</th>
                    <th>Available Stock</th>
                    <th>Bond Expiry</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    <script src="js/app.js?v=61"></script>
    <script>document.addEventListener('DOMContentLoaded', async () => {
        if (!authCheck()) return; 
        initNavigation();
        await loadStockPage(); 
    });</script>
  </body>
</html>
