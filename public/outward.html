<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outward Register - CAFS Inventory</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar" id="sidebar-container"></aside>

      <main class="main-content">
        <header class="top-bar" id="top-bar-container"></header>
        <div class="content-body">
          <div class="page-header">
            <h1 class="page-title">Outward Register</h1>
            <button class="btn btn-primary" onclick="window.location.href='outward-entry.html'">
              <i class="fas fa-plus"></i> New Entry
            </button>
          </div>
          <div class="card">
            <div class="card-body" style="padding: 0">
              <table class="table" id="outward-table">
                <thead>
                  <tr>
                    <th>Dispatch Date</th>
                    <th>Flight No</th>
                    <th>Consignment</th>
                    <th>Inward Bond</th>
                    <th>Items Dispatched</th>
                    <th>Total Qty</th>
                    <th>Bag Returns</th>
                    <th>Net Out</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    <script src="js/app.js?v=20"></script>
    <script>document.addEventListener('DOMContentLoaded', async () => {
        if (!authCheck()) return; 
        initNavigation();
        await loadOutwardPage(); 
    });</script>
  </body>
</html>
