<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Return Stock - CAFS Inventory</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar" id="sidebar-container"></aside>

      <main class="main-content">
        <header class="top-bar" id="top-bar-container"></header>
        <div class="content-body">
          <div class="page-header">
            <h1 class="page-title">Return Stock to Origin (Supplier/Bond)</h1>
            <button class="btn btn-primary" onclick="openReturnStockModal()"><i class="fas fa-plus"></i> Process Return</button>
          </div>
          <div class="card">
            <div class="card-body" style="padding: 0">
              <table class="table" id="return-stock-table">
                <thead>
                  <tr>
                    <th>Return Date</th>
                    <th>Bond No</th>
                    <th>Item</th>
                    <th>Qty Returned</th>
                    <th>Reason / Remarks</th>
                    <th>Authorised By</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Modal Overlay (Generic) -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="modal-title">Modal Title</h3>
          <button class="btn-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer" id="modal-footer" style="display:none"></div>
      </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    <script src="js/app.js?v=19"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
          if (!authCheck()) return; 
          initNavigation();
          await loadReturnStockPage(); 
        });
    </script>
  </body>
</html>
