<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inward Register - CAFS Inventory</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  </head>
  <body>
    <div class="app-container">
      <!-- Sidebar Navigation -->
      <aside class="sidebar" id="sidebar-container"></aside>

      <!-- Main Content Area -->
      <main class="main-content">
        <header class="top-bar" id="top-bar-container"></header>

        <div class="content-body">
          <div class="page-header">
            <h1 class="page-title">Inward Register</h1>
            <button
              class="btn btn-primary"
              onclick="window.location.href='inward-entry.html'"
            >
              <i class="fas fa-plus"></i> New Entry
            </button>
          </div>
          <div class="card">
            <div class="card-body" style="padding: 0">
              <table class="table" id="inward-table">
                <thead>
                  <tr>
                    <th>Receipt Date</th>
                    <th>BE No / Date</th>
                    <th>Bond No</th>
                    <th>Items</th>
                    <th>Consignment</th>
                    <th>Total Qty</th>
                    <th>Avail Stock</th>
                    <th>Value</th>
                    <th>Duty</th>
                    <th>Total</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Notifications Container -->
    <!-- Modal Overlay (Generic) -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="modal-title">Modal Title</h3>
          <button class="btn-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer" id="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Close</button>
          <button class="btn btn-primary" id="modal-submit">Save</button>
        </div>
      </div>
    </div>
    <div id="toast-container" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    <script src="js/app.js?v=58"></script>
    <script>
      // Load inward data on page load
      document.addEventListener('DOMContentLoaded', async () => {
        if (!authCheck()) return;
        initNavigation();
        await loadInwardPage();
      });
    </script>
  </body>
</html>
