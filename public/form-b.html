<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form-B Monthly - CAFS Inventory</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar" id="sidebar-container"></aside>

      <main class="main-content">
        <header class="top-bar" id="top-bar-container"></header>
        <div class="content-body">
          <div class="report-controls no-print">
              <div class="page-header"><h1 class="page-title">Form-B Report (A3 Landscape)</h1></div>
              <div class="form-grid-4">
                <div class="form-group">
                  <select class="form-control" id="formb-airline" placeholder="Search Airline...">
                    <option value="">All Airlines</option>
                  </select>
                </div>
                <div class="form-group">
                  <select class="form-control" id="formb-month">
                    <option value="1">January</option>
                    <option value="2">February</option>
                    <option value="3">March</option>
                    <option value="4">April</option>
                    <option value="5">May</option>
                    <option value="6">June</option>
                    <option value="7">July</option>
                    <option value="8">August</option>
                    <option value="9">September</option>
                    <option value="10">October</option>
                    <option value="11">November</option>
                    <option value="12">December</option>
                  </select>
                </div>
                <div class="form-group">
                  <input type="number" class="form-control" id="formb-year" value="2025" />
                </div>
                <div class="form-group">
                  <button class="btn btn-primary" onclick="generateFormB()">Generate</button>
                  <button class="btn btn-secondary" onclick="window.print()">
                    <i class="fas fa-print"></i> Print
                  </button>
                  <button class="btn btn-success" onclick="downloadFormBPDF()">
                    <i class="fas fa-file-pdf"></i> Download PDF
                  </button>
                </div>
              </div>
            </div>
            <div id="formb-report-container" class="report-print-container landscape-a3"></div>
        </div>
      </main>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    <script src="js/app.js?v=19"></script>
    <script>document.addEventListener('DOMContentLoaded', async () => {
        if (!authCheck()) return; 
        initNavigation();
        await loadFormBPage(); 
    });</script>
  </body>
</html>
