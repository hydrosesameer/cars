<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detailed Stock - CAFS Inventory</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar" id="sidebar-container"></aside>

      <main class="main-content">
        <header class="top-bar" id="top-bar-container"></header>
        <div class="content-body">
          <div class="report-controls no-print">
              <div class="page-header"><h1 class="page-title">Detailed Stock Inventory</h1></div>
              <div class="form-grid-4">
                <div class="form-group">
                  <label>Date From</label>
                  <input type="text" data-datepicker="true" id="stock-filter-from" class="form-control" />
                </div>
                <div class="form-group">
                  <label>Date To</label>
                  <input type="text" data-datepicker="true" id="stock-filter-to" class="form-control" />
                </div>
                <div class="form-group">
                  <label>Airline</label>
                  <select class="form-control searchable" id="stock-filter-consignment">
                    <option value="">All Consignments</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Bond No</label>
                  <select id="stock-filter-bond" class="form-control searchable">
                    <option value="">All Bond Numbers</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Expiry Date</label>
                  <input type="text" data-datepicker="true" id="stock-filter-expiry" class="form-control" />
                </div>
                <!-- Need 1 more gap or just place actions in final columns -->
                <div class="form-group" style="grid-column: span 3; display: flex; align-items: flex-end; gap: 10px;">
                  <button class="btn btn-primary" onclick="loadDetailedStockReport()">Filter</button>
                  <button class="btn btn-secondary" onclick="window.print()">
                    <i class="fas fa-print"></i> Print
                  </button>
                </div>
              </div>
            </div>
            <div class="card">
              <div class="card-body" style="padding: 0">
                <table class="table" id="detailed-stock-table">
                  <thead>
                    <tr>
                      <th>BE No / Date</th>
                      <th>Bond No</th>
                      <th>Description</th>
                      <th>Original Qty</th>
                      <th>Available Qty</th>
                      <th>Expiry Date</th>
                      <th>Consignment</th>
                    </tr>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>
        </div>
      </main>
    </div>

    <!-- Generic Modal Overlay -->
    <div class="modal-overlay" id="modal-overlay" style="display: none;">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="modal-title"></h3>
          <button class="btn-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer" id="modal-footer"></div>
      </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    <script src="js/app.js?v=59"></script>
    <script>document.addEventListener('DOMContentLoaded', async () => {
        if (!authCheck()) return; 
        initNavigation();
        await loadDetailedStockPage(); 
    });</script>
  </body>
</html>
