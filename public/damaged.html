<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAFS - Damaged Goods</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  </head>
  <body>
    <div class="app-container">
      <!-- Sidebar Navigation -->
      <aside class="sidebar" id="sidebar-container"></aside>

      <main class="main-content">
        <header class="top-bar" id="top-bar-container"></header>

        <div id="page-content" class="content-body">
          <section id="page-damaged" class="page active">
            <div class="page-header">
              <h1 class="page-title">Damaged Goods Register</h1>
              <button class="btn btn-primary" onclick="openDamageModal()"><i class="fas fa-plus"></i> Report Damage</button>
            </div>
            
            <div class="dash-stats" id="damaged-stats">
              <div class="dash-stat grad-red">
                <div class="stat-icon-bg"><i class="fas fa-file-alt"></i></div>
                <div class="stat-value" id="stat-total-reports">-</div>
                <div class="stat-label">Total Reports</div>
              </div>
              <div class="dash-stat grad-orange">
                <div class="stat-icon-bg"><i class="fas fa-cubes"></i></div>
                <div class="stat-value" id="stat-total-qty">-</div>
                <div class="stat-label">Total Qty Damaged</div>
              </div>
              <div class="dash-stat grad-blue">
                <div class="stat-icon-bg"><i class="fas fa-calendar-alt"></i></div>
                <div class="stat-value" id="stat-latest-date">-</div>
                <div class="stat-label">Latest Incident</div>
              </div>
            </div>

            <div class="card">
              <div class="card-body" style="padding: 0">
                <table class="table" id="damaged-table">
                  <thead>
                    <tr>
                      <th>Reported Date</th>
                      <th>Bond No</th>
                      <th>BE No</th>
                      <th>Airline / Consignment</th>
                      <th>Item Description</th>
                      <th>Qty Damaged</th>
                      <th>Reason</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <!-- Modal for Damage Entry -->
    <div class="modal-overlay" id="damage-modal">
      <div class="modal" style="width: 600px; max-height: 90vh;">
        <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title">Report Damaged Item</h2>
          <button class="close-btn" onclick="closeDamageModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
          <form id="damage-form" onsubmit="event.preventDefault(); saveDamage();">
            <div class="form-group">
              <label>Select Bond No *</label>
              <select id="dmg-bond-select" class="form-control" required style="width: 100%;">
                <option value="">Loading bonds...</option>
              </select>
            </div>
            
            <div id="dmg-items-container" style="display: none; margin-bottom: 1rem;">
              <label>Items for Selected Bond</label>
              <table class="table" style="margin-top: 0.5rem;">
                <thead>
                  <tr>
                    <th>Description</th>
                    <th>Avail Qty</th>
                    <th style="width: 120px;">Qty Damaged</th>
                  </tr>
                </thead>
                <tbody id="dmg-items-tbody"></tbody>
              </table>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Reported Date</label>
                <input type="text" data-datepicker="true" id="dmg-date" class="form-control" required>
              </div>
              <div class="form-group">
                <label>Reason</label>
                <select id="dmg-reason" class="form-control">
                  <option value="Damaged in transit">Damaged in transit</option>
                  <option value="Breakage">Breakage</option>
                  <option value="Expired">Expired</option>
                  <option value="Other">Other</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label>Remarks</label>
              <textarea id="dmg-remarks" class="form-control" rows="2"></textarea>
            </div>
            <div class="form-actions" style="margin-top: 20px;">
              <button type="button" class="btn btn-outline" onclick="closeDamageModal()">Cancel</button>
              <button type="submit" class="btn btn-primary">Save Report</button>
            </div>
          </form>
        </div>
      </div>
    </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    <script src="js/app.js?v=19"></script>
    <script>
      document.addEventListener('DOMContentLoaded', async () => {
        if (!authCheck()) return;
        initNavigation();
        const dateInput = document.getElementById('dmg-date');
        if (dateInput) dateInput.valueAsDate = new Date();
        await loadDamagedItems();
        
        const bondSelect = document.getElementById('dmg-bond-select');
        if (bondSelect) {
            bondSelect.addEventListener('change', (e) => {
              fetchDamageBondItems(e.target.value);
            });
        }
      });
    </script>
    </script>
  </body>
</html>
